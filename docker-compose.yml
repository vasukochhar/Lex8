version: "3.9"

services:
  # ── Postgres 16 ──
  postgres:
    image: postgres:16-alpine
    container_name: lex8-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lex8
      POSTGRES_PASSWORD: lex8_dev
      POSTGRES_DB: lex8
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lex8"]
      interval: 5s
      retries: 5

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    container_name: lex8-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Redpanda (Kafka-compatible, no JVM) ──
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    container_name: lex8-redpanda
    restart: unless-stopped
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  # ── Qdrant (Vector DB) ──
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: lex8-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  # ── OpenSearch (BM25 search) ──
  opensearch:
    image: opensearchproject/opensearch:2.19.2
    container_name: lex8-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data

volumes:
  pgdata:
  qdrantdata:
  osdata:
